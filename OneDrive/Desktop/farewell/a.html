<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>You're Invited</title>
    <link rel="stylesheet" href="b.css">
</head>
<body>

    <div id="main-container">
        <!-- 1. THE ENVELOPE (Visible first) -->
        <div id="envelope-shell">
            <div class="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                
                <!-- Golden Silk Ribbon -->
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
                
                <!-- The Bow -->
                <div class="bow-container" id="magic-ribbon">
                    <div class="bow-loop-l"></div>
                    <div class="bow-loop-r"></div>
                    <div class="bow-center"></div>
                </div>
            </div>
            <p class="instruction">Tap the golden ribbon ✨</p>
        </div>

        <!-- 2. THE INVITATION (Hidden initially) -->
        <div id="invitation-box" class="hidden">
            <img src="Go.png" alt="Farewell Invitation" id="invite-img">
        </div>
    </div>

    <script src="c.js"></script>
</body>
</html>
